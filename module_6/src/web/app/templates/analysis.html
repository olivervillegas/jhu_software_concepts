<!DOCTYPE html>
<html>
<head>
  <title>Analysis</title>
</head>
<body>
  <h1>Analysis</h1>

  {% if request.args.get("queued") %}
    <p data-testid="queued-banner"><strong>Queued:</strong> {{ request.args.get("queued") }}</p>
  {% endif %}

  <form method="post" action="/pull-data">
    <button data-testid="pull-data-btn" type="submit">Pull Data</button>
  </form>

  <form method="post" action="/update-analysis">
    <button data-testid="update-analysis-btn" type="submit">Update Analysis</button>
  </form>

  <ul data-testid="analysis-list">
    {% for key, value in results.items() %}
      <li><strong>{{ key }}:</strong> <span>{{ value }}</span></li>
    {% endfor %}
  </ul>
</body>
</html>
